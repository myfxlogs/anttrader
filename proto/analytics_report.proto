syntax = "proto3";
package antrader;
option go_package = "anttrader/gen/proto;antrader";
import "google/protobuf/timestamp.proto";
message GetReportRequest { string account_id = 1; string report_type = 2; string period = 3; }
message Report { string id = 1; string account_id = 2; string report_type = 3; string title = 4; string content = 5; repeated string recommendations = 6; google.protobuf.Timestamp created_at = 7; }
message GetRecentTradesRequest { string account_id = 1; int32 page = 2; int32 page_size = 3; }
message RecentTradesResponse { repeated TradeRecord trades = 1; int32 total = 2; }
message TradeRecord { int64 ticket = 1; string symbol = 2; string type = 3; double volume = 4; double open_price = 5; double close_price = 6; double profit = 7; google.protobuf.Timestamp open_time = 8; google.protobuf.Timestamp close_time = 9; }
