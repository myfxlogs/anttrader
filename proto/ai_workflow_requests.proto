syntax = "proto3";

package antrader;

option go_package = "anttrader/gen/proto;antrader";

import "ai_workflow_entity.proto";

message CreateWorkflowRunRequest {
  string title = 1;
  string context_json = 2;
}

message CreateWorkflowRunResponse {
  WorkflowRunSummary run = 1;
}

message AppendWorkflowStepRequest {
  string run_id = 1;
  string key = 2;
  string title = 3;
  string status = 4;
  string input = 5;
  string output = 6;
  string error = 7;
  int64 duration_ms = 8;
}

message AppendWorkflowStepResponse {
  WorkflowStep step = 1;
}

message ListWorkflowRunsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message ListWorkflowRunsResponse {
  repeated WorkflowRunSummary runs = 1;
}

message GetWorkflowRunRequest {
  string id = 1;
}

message GetWorkflowRunResponse {
  WorkflowRunSummary run = 1;
  repeated WorkflowStep steps = 2;
  string context_json = 3;
}
