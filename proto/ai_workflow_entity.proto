syntax = "proto3";

package antrader;

option go_package = "anttrader/gen/proto;antrader";

import "google/protobuf/timestamp.proto";

message WorkflowRunSummary {
  string id = 1;
  string title = 2;
  string status = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
  int32 step_count = 6;
}

message WorkflowStep {
  string id = 1;
  string run_id = 2;
  string key = 3;
  string title = 4;
  string status = 5;
  string input = 6;
  string output = 7;
  string error = 8;
  int64 duration_ms = 9;
  google.protobuf.Timestamp created_at = 10;
}
