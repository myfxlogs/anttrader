syntax = "proto3";

package antrader;

option go_package = "anttrader/gen/proto;antrader";

import "google/protobuf/timestamp.proto";

message ListSignalsRequest {
  string account_id = 1;
  string status = 2;
}

message ListSignalsResponse {
  repeated StrategySignal signals = 1;
}

message StrategySignal {
  string id = 1;
  string strategy_id = 2;
  string account_id = 3;
  string symbol = 4;
  string signal_type = 5;
  double volume = 6;
  double price = 7;
  double stop_loss = 8;
  double take_profit = 9;
  string reason = 10;
  string status = 11;
  int64 executed_ticket = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp executed_at = 14;
}

message ExecuteSignalRequest {
  string signal_id = 1;
}

message ExecuteSignalResponse {
  int64 ticket = 1;
  string symbol = 2;
  string type = 3;
  double volume = 4;
  double price = 5;
  google.protobuf.Timestamp executed_at = 6;
}

message ConfirmSignalRequest {
  string signal_id = 1;
}

message CancelSignalRequest {
  string signal_id = 1;
}
