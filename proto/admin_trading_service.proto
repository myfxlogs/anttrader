syntax = "proto3";
package antrader;
option go_package = "anttrader/gen/proto;antrader";
import "admin_trading.proto";
service AdminTradingService {
  rpc ListPositions(ListPositionsRequest) returns (ListPositionsResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc GetTradingSummary(GetTradingSummaryRequest) returns (TradingSummary);
}
