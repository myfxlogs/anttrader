syntax = "proto3";

package antrader;

option go_package = "anttrader/gen/proto;antrader";

message GetSymbolsRequest { string account_id = 1; }
message GetSymbolsResponse { repeated SymbolInfo symbols = 1; }
message SymbolInfo {
  string symbol = 1; string description = 2; string currency = 3; int32 digits = 4;
  double tick_size = 5; double tick_value = 6; double contract_size = 7;
  double min_lot = 8; double max_lot = 9; double lot_step = 10;
}
message GetSymbolParamsRequest { string account_id = 1; string symbol = 2; }
message SymbolParamsResponse { SymbolInfo symbol = 1; SymbolGroup group = 2; }
message SymbolGroup { string name = 1; double min_lot = 2; double max_lot = 3; double lot_step = 4; string trade_mode = 5; }
