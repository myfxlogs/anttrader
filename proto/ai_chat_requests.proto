syntax = "proto3";

package antrader;

option go_package = "anttrader/gen/proto;antrader";

import "ai_conversation.proto";

message ChatRequest {
  string message = 1;
  string context = 2;
  string account_id = 3;
  string conversation_id = 4;
}

message ChatResponse {
  string message = 1;
  repeated string suggestions = 2;
}

// Incremental chunk for ChatStream (Connect server-stream).
message ChatStreamChunk {
  string delta = 1;
  bool done = 2;
  int32 prompt_tokens = 3;
  int32 completion_tokens = 4;
  // When ending with an error, last frame may carry a short user-facing summary.
  string error_message = 5;
}

message ListConversationsRequest {}

message ListConversationsResponse {
  repeated ConversationSummary conversations = 1;
}

message GetConversationRequest {
  string id = 1;
}

message GetConversationResponse {
  ConversationSummary conversation = 1;
  repeated ConversationMessage messages = 2;
}

message CreateConversationRequest {
  string title = 1;
}

message CreateConversationResponse {
  ConversationSummary conversation = 1;
}

message DeleteConversationRequest {
  string id = 1;
}

message DeleteConversationResponse {
  bool success = 1;
}

message UpdateConversationTitleRequest {
  string id = 1;
  string title = 2;
}

message UpdateConversationTitleResponse {
  bool success = 1;
}
