syntax = "proto3";

package antrader;

option go_package = "anttrader/gen/proto;antrader";

import "google/protobuf/timestamp.proto";

message ProfitUpdateEvent { string account_id = 1; double balance = 2; double credit = 3; double profit = 4; double equity = 5; double margin = 6; double free_margin = 7; double margin_level = 8; repeated OrderProfitItem orders = 9; double profit_percent = 10; }
message UserSummaryEvent { double total_balance = 1; double total_equity = 2; double total_profit = 3; int32 account_count = 4; int32 connected_count = 5; google.protobuf.Timestamp updated_at = 6; double pnl_today = 7; double pnl_week = 8; double pnl_month = 9; int32 trades_today = 10; int32 trades_week = 11; int32 trades_month = 12; double win_rate = 13; double profit_factor = 14; double max_drawdown_percent = 15; int32 max_consecutive_wins = 16; int32 max_consecutive_losses = 17; }
message OrderProfitItem { int64 ticket = 1; string symbol = 2; double profit = 3; double volume = 4; double current_price = 5; }
message AccountStatusEvent { string account_id = 1; string status = 2; string message = 3; }
message StrategyExecutionEvent { string strategy_id = 1; string account_id = 2; string symbol = 3; string action = 4; string status = 5; string message = 6; }
message RiskAlertEvent { string account_id = 1; string alert_type = 2; string message = 3; double value = 4; double threshold = 5; }
