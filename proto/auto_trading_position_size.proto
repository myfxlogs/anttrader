syntax = "proto3";

package antrader;

option go_package = "anttrader/gen/proto;antrader";

message CalculatePositionSizeRequest { string account_id = 1; string symbol = 2; double account_balance = 3; double stop_loss_pips = 4; double risk_percent = 5; }
message CalculatePositionSizeResponse { double volume = 1; double risk_amount = 2; double pip_value = 3; double min_volume = 4; double max_volume = 5; }
