syntax = "proto3";

package antrader;

option go_package = "anttrader/gen/proto;antrader";

import "google/protobuf/timestamp.proto";

message GetKlinesRequest { string account_id = 1; string symbol = 2; string timeframe = 3; string from = 4; string to = 5; int32 count = 6; }
message GetKlinesResponse { repeated Kline klines = 1; }
message Kline { google.protobuf.Timestamp time = 1; double open = 2; double high = 3; double low = 4; double close = 5; uint64 volume = 6; }
