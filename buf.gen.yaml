version: v2
inputs:
  - directory: proto
clean: false
plugins:
  - local: protoc-gen-go
    out: backend/gen/proto
    opt:
      - paths=import
  - local: protoc-gen-connect-go
    out: backend/gen/proto
    opt:
      - paths=import
  - local: protoc-gen-es
    out: frontend/src/gen
    opt: target=ts
